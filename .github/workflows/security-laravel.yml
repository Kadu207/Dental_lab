name: Dental Lab Security and Quality Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

concurrency:
  group: dental-lab-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build and Type Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build monorepo
        run: npm run build

  tests:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  security:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Verify Postgres schema sources
        run: |
          test -f apps/api/src/db/schema-postgres.sql
          test -f apps/api/src/db/schema-platform.sql
