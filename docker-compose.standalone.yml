# Stack completa do módulo laboratório (desenvolvimento local)
# Uso: docker compose -f docker-compose.standalone.yml up -d --build
# UI:  http://localhost:9180
# Produção VPS: docker-compose.prod.yml + .env.production.example → dentallab.inovatitech.com.br
services:
  lab-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LAB_POSTGRES_DB:-dental_lab}
      POSTGRES_USER: ${LAB_POSTGRES_USER:-dental_lab}
      POSTGRES_PASSWORD: ${LAB_POSTGRES_PASSWORD:-dental_lab}
    ports:
      - "${LAB_POSTGRES_PORT:-5433}:5432"
    volumes:
      - lab_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LAB_POSTGRES_USER:-dental_lab} -d ${LAB_POSTGRES_DB:-dental_lab}"]
      interval: 10s
      timeout: 5s
      retries: 5

  lab-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3333
      DENTAL_LAB_DEPLOYMENT_MODE: standalone
      DENTAL_LAB_DB_DRIVER: postgres
      DENTAL_LAB_DATABASE_URL: postgresql://${LAB_POSTGRES_USER:-dental_lab}:${LAB_POSTGRES_PASSWORD:-dental_lab}@lab-postgres:5432/${LAB_POSTGRES_DB:-dental_lab}
      DENTAL_LAB_AUTH_REQUIRED: "true"
      DENTAL_LAB_LICENSE_REQUIRED: ${DENTAL_LAB_LICENSE_REQUIRED:-false}
      DENTAL_LAB_LICENSE_KEY: ${DENTAL_LAB_LICENSE_KEY:-}
      DENTAL_LAB_LICENSE_SERVER_URL: ${DENTAL_LAB_LICENSE_SERVER_URL:-}
      DENTAL_LAB_LICENSE_SERVER_API_KEY: ${DENTAL_LAB_LICENSE_SERVER_API_KEY:-}
      DENTAL_LAB_TRIAL_DAYS: ${DENTAL_LAB_TRIAL_DAYS:-30}
      DENTAL_LAB_JWT_SECRET: ${DENTAL_LAB_JWT_SECRET:-change-me-lab-jwt}
      DENTAL_LAB_CORS_ORIGINS: ${DENTAL_LAB_CORS_ORIGINS:-http://localhost:9180}
    ports:
      - "${LAB_API_PORT:-3333}:3333"
    depends_on:
      lab-postgres:
        condition: service_healthy

  lab-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.standalone
    restart: unless-stopped
    ports:
      - "${LAB_WEB_PORT:-9180}:8080"
    depends_on:
      - lab-api

volumes:
  lab_postgres_data:
