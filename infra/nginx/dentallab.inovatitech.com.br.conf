# Dental Lab standalone — proxy para lab-web na porta host 9180
#
# ONDE USAR ESTE ARQUIVO:
#   Copie para o nginx DOCKER do Excellence (NÃO use nginx systemd na VPS):
#   /opt/excellence/repo/infra/nginx/dentallab.inovatitech.com.br.conf
#
# Requer no docker-compose.prod.yml do Excellence (serviço nginx):
#   extra_hosts:
#     - "host.docker.internal:host-gateway"
#   volumes:
#     - ./infra/nginx/dentallab.inovatitech.com.br.conf:/etc/nginx/conf.d/20-dentallab.inovatitech.com.br.conf:ro

upstream dental_lab_web {
    server host.docker.internal:9180;
    keepalive 8;
}

server {
    listen 80;
    server_name dentallab.inovatitech.com.br;

    client_max_body_size 5m;

    location / {
        proxy_pass http://dental_lab_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Clinica-Id $http_x_clinica_id;
        proxy_set_header Connection "";
    }
}
