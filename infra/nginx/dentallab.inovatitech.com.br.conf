# Nginx inicial (HTTP) — use ANTES do certbot.
# Depois: sudo certbot --nginx -d dentallab.inovatitech.com.br

upstream dental_lab_web {
    server 127.0.0.1:9180;
    keepalive 8;
}

server {
    listen 80;
    server_name dentallab.inovatitech.com.br;

    client_max_body_size 5m;

    location / {
        proxy_pass http://dental_lab_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
